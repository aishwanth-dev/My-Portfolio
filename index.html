<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aishwanth's Links</title>
  <meta name="description" content="Aishwanth — Founder of Juskoe, Intern @omgx.ai.pvt.ltd. Connect on LinkedIn, GitHub, X, and more.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600&family=Poppins:wght@400;600&family=Fira+Sans:wght@400&display=swap" rel="stylesheet">

  <style>
    /* ===== RESET ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== BODY ===== */
    body {
      font-family: "Bricolage Grotesque", sans-serif;
      font-optical-sizing: auto;
      font-weight: 600;
      font-style: normal;
      font-variation-settings: "wdth" 100;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      text-align: center;
      color: #fff;
      overflow-x: hidden;
    }

    /* ===== FIXED GIF BACKGROUND ===== */
    .gif-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      overflow: hidden;
      background: #09090b;
    }

    .gif-bg .bg-main {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 80%; /* Focus on middle-to-bottom part */
      transform: scale(1.25);      /* Fully zoom in */
      z-index: -1;
    }

    .gif-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    /* ===== LOADING SCREEN ===== */
    /* From Uiverse.io by StealthWorm */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      display: flex;
      width: 8rem;
      height: 8rem;
      justify-content: center;
      align-items: center;
      position: relative;
      flex-direction: column;
    }

    .curve {
      width: 180%;
      height: 180%;
      position: absolute;
      animation: rotate 8s linear infinite;
      fill: transparent;
    }

    .curve text {
      letter-spacing: 20px;
      text-transform: uppercase;
      font: 1.5em "Fira Sans", sans-serif;
      fill: white;
      filter: drop-shadow(0 2px 8px black);
    }

    .blackhole {
      z-index: -1;
      display: flex;
      position: absolute;
      width: 8rem;
      height: 8rem;
      align-items: center;
      justify-content: center;
    }

    .blackhole-circle {
      z-index: 0;
      display: flex;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at center, black 25%, white 35%, white 100%);
      box-shadow: 0px 0px 2rem #c2babb;
      align-items: center;
      justify-content: center;
    }

    .blackhole-circle::after {
      z-index: 0;
      position: absolute;
      content: "";
      display: flex;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid white;
      background: radial-gradient(circle at center, black 35%, white 60%, white 100%);
      box-shadow: 0px 0px 5rem #c2babb;
      align-items: center;
      justify-content: center;
      filter: blur(4px);
      animation: pulseAnimation linear infinite 2s alternate-reverse;
    }

    .blackhole-circle::before {
      z-index: 1;
      content: "";
      display: flex;
      width: 4rem;
      height: 4rem;
      border: 2px solid #ffffff;
      box-shadow: 3px 3px 10px #c2babb, inset 0 0 1rem #ffffff;
      border-radius: 50%;
      top: 5rem;
      filter: blur(0.5px);
      animation: rotate linear infinite 3s;
    }

    .blackhole-disc {
      position: absolute;
      z-index: 0;
      display: flex;
      width: 5rem;
      height: 10rem;
      border-radius: 50%;
      background: radial-gradient(circle at center, #ffffff 80%, #353535 90%, white 100%);
      filter: blur(1rem) brightness(130%);
      border: 1rem solid white;
      box-shadow: 0px 0px 3rem #d7c4be;
      transform: rotate3d(1, 1, 1, 220deg);
      animation: pulseAnimation2 linear infinite 2s alternate-reverse;
      justify-content: center;
      align-items: center;
    }

    .blackhole-disc::before {
      content: "";
      position: absolute;
      z-index: 0;
      display: flex;
      width: 5rem;
      height: 10rem;
      border-radius: 50%;
      background: radial-gradient(circle at center, #ffffff 80%, #353535 90%, white 100%);
      filter: blur(3rem);
      border: 1rem solid white;
      box-shadow: 0px 0px 6rem #d7c4be;
      animation: pulseAnimation linear infinite 2s alternate-reverse;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes pulseAnimation {
      0% {
        box-shadow: 0px 0px 3rem #c2babb;
        transform: scale(1);
      }
      100% {
        box-shadow: 0px 0px 5rem #c2babb;
        transform: scale(1.09);
      }
    }

    @keyframes pulseAnimation2 {
      0% {
        box-shadow: 0px 0px 3rem #c2babb;
        transform: rotate3d(1, 1, 1, 220deg) scale(1);
      }
      100% {
        box-shadow: 0px 0px 5rem #c2babb;
        transform: rotate3d(1, 1, 1, 220deg) scale(.95);
      }
    }

    /* ===== LINK-CLICK LOADING ===== */
    .link-loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.92);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .link-loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ===== MAIN CONTENT ===== */
    .content-wrapper {
      position: relative;
      z-index: 1;
      padding: 50px 20px 40px;
      max-width: 480px;
      margin: 0 auto;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .content-wrapper.visible {
      opacity: 1;
    }

    /* ===== GLASS PILL for profile image ===== */
    .glass-pill-pfp {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      padding: 8px;
      margin-bottom: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* ===== GLASS LINE for each text row ===== */
    .glass-line {
      display: inline-block;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50px;
      padding: 6px 22px;
      margin: 4px 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .glass-line-quote {
      display: inline-block;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 10px 22px;
      margin: 6px 0 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .info-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: 20px;
    }

    /* ===== PROFILE IMAGE ===== */
    .profile-section {
      display: inline-block;
    }

    .profile-img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), 0 0 0 6px rgba(255, 255, 255, 0.06);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .profile-img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.3), 0 0 0 8px rgba(255, 255, 255, 0.1);
    }

    /* ===== NAME ===== */
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
      color: #fff;
    }

    /* ===== SHINING SUBTITLE (Founder info) ===== */
    /* From Uiverse.io by neerajbaniwal */
    .btn-shine {
      display: inline-block;
      padding: 0;
      color: #fff;
      background: linear-gradient(to right, #9f9f9f 0, #fff 10%, #868686 20%);
      background-size: 500px 100%;
      background-position: 0;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 4s linear infinite;
      -webkit-text-size-adjust: none;
      font-weight: 600;
      font-size: 13px;
      text-decoration: none;
      white-space: nowrap;
      font-family: "Poppins", sans-serif;
    }

    @-moz-keyframes shine {
      0% { background-position: -500px; }
      100% { background-position: 500px; }
    }
    @-webkit-keyframes shine {
      0% { background-position: -500px; }
      100% { background-position: 500px; }
    }
    @-o-keyframes shine {
      0% { background-position: -500px; }
      100% { background-position: 500px; }
    }
    @keyframes shine {
      0% { background-position: -500px; }
      100% { background-position: 500px; }
    }

    /* ===== EMAIL (plain, no glow) ===== */
    .email {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
      margin: 0;
      font-family: "Poppins", sans-serif;
      font-weight: 400;
    }

    /* ===== QUOTE ===== */
    .quote {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin: 0;
      line-height: 1.5;
      font-weight: 400;
    }

    /* ===== GRADIENT GLOW "LET'S CONNECT" BUTTON ===== */
    /* From Uiverse.io by Itskrish01 */
    .connect-btn-wrapper {
      display: inline-block;
      margin-bottom: 24px;
    }

    .connect-btn {
      position: relative;
      background: rgb(38, 38, 38);
      border-radius: 9999px;
      padding: 2px;
      overflow: hidden;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
    }

    .connect-btn .glow-bg {
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      overflow: hidden;
      pointer-events: none;
    }

    .connect-btn .glow-bg .glow-blob {
      display: block;
      transform: translate(-50%, -33%);
      width: 96px;
      height: 96px;
      filter: blur(20px);
      background: linear-gradient(135deg, rgb(122, 105, 249), rgb(242, 99, 120), rgb(245, 131, 63));
    }

    .connect-btn .glow-border {
      position: absolute;
      inset: 0;
      pointer-events: none;
      animation: 10s ease-in-out 0s infinite alternate none running border-glow-translate;
    }

    .connect-btn .glow-border .glow-streak {
      display: block;
      height: 100%;
      width: 48px;
      filter: blur(20px);
      transform: translateX(-50%);
      border-radius: 9999px;
      animation: 10s ease-in-out 0s infinite alternate none running border-glow-scale;
      background: linear-gradient(135deg, rgb(122, 105, 249), rgb(242, 99, 120), rgb(245, 131, 63));
    }

    @keyframes border-glow-translate {
      0% { transform: translateX(0%); }
      100% { transform: translateX(400%); }
    }

    @keyframes border-glow-scale {
      0% { transform: scaleX(1) translateX(-50%); }
      100% { transform: scaleX(1.8) translateX(-50%); }
    }

    .connect-btn .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
      z-index: 1;
      background: rgba(10, 10, 10, 0.9);
      border-radius: 9999px;
      padding: 14px 28px 14px 18px;
      width: 100%;
    }

    .connect-btn .star-wrap {
      position: relative;
      display: inline-flex;
      transition: transform 0.5s ease;
    }

    .connect-btn:hover .star-wrap {
      transform: scale(1.05) rotate(360deg);
    }

    .connect-btn .star-wrap svg {
      opacity: 0.8;
      animation: 14s cubic-bezier(0.68, -0.55, 0.27, 1.55) 0s infinite alternate none running star-rotate;
    }

    @keyframes star-rotate {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.15); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .connect-btn .star-wrap .star-shine {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      filter: blur(16px);
      opacity: 0;
      animation: 14s ease-in-out 0s infinite alternate none running star-shine;
      background: linear-gradient(135deg, rgb(59, 196, 242), rgb(122, 105, 249), rgb(242, 99, 120), rgb(245, 131, 63));
    }

    @keyframes star-shine {
      0% { opacity: 0; }
      50% { opacity: 0.3; }
      100% { opacity: 0; }
    }

    .connect-btn .btn-label {
      margin-left: 6px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: transform 0.3s ease;
    }

    .connect-btn:hover .btn-label {
      transform: scale(1.05);
    }

    /* ===== LINK BUTTONS ===== */
    /* From Uiverse.io by MuhammadHasann */
    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .button {
      --black-700: hsla(0 0% 12% / 1);
      --border_radius: 9999px;
      --transtion: 0.3s ease-in-out;
      --offset: 2px;

      cursor: pointer;
      position: relative;

      display: flex;
      align-items: center;
      gap: 0.6rem;

      transform-origin: center;

      padding: 0.85rem 1.8rem;
      background-color: transparent;

      border: none;
      border-radius: var(--border_radius);
      transform: scale(calc(1 + (var(--active, 0) * 0.1)));

      transition: transform var(--transtion);

      width: 270px;
      text-decoration: none;
      font-family: inherit;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      width: 100%;
      height: 100%;
      background-color: var(--black-700);

      border-radius: var(--border_radius);
      box-shadow: inset 0 0.5px hsl(0, 0%, 100%), inset 0 -1px 2px 0 hsl(0, 0%, 0%),
        0px 4px 10px -4px hsla(0 0% 0% / calc(1 - var(--active, 0))),
        0 0 0 calc(var(--active, 0) * 0.375rem) hsl(260 97% 50% / 0.75);

      transition: all var(--transtion);
      z-index: 0;
    }

    .button::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      width: 100%;
      height: 100%;
      background-color: hsla(260 97% 61% / 0.75);
      background-image: radial-gradient(
          at 51% 89%,
          hsla(266, 45%, 74%, 1) 0px,
          transparent 50%
        ),
        radial-gradient(at 100% 100%, hsla(266, 36%, 60%, 1) 0px, transparent 50%),
        radial-gradient(at 22% 91%, hsla(266, 36%, 60%, 1) 0px, transparent 50%);
      background-position: top;

      opacity: var(--active, 0);
      border-radius: var(--border_radius);
      transition: opacity var(--transtion);
      z-index: 2;
    }

    .button:is(:hover, :focus-visible) {
      --active: 1;
    }
    .button:active {
      transform: scale(1);
    }

    /* Dots border — HIDDEN by default, only shows on hover */
    .button .dots_border {
      --size_border: calc(100% + 2px);

      overflow: hidden;

      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      width: var(--size_border);
      height: var(--size_border);
      background-color: transparent;

      border-radius: var(--border_radius);
      z-index: -10;

      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .button:is(:hover, :focus-visible) .dots_border {
      opacity: 1;
    }

    .button .dots_border::before {
      content: "";
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      transform-origin: left;
      transform: rotate(0deg);

      width: 100%;
      height: 2rem;
      background-color: white;

      mask: linear-gradient(transparent 0%, white 120%);
      animation: rotate 2s linear infinite;
    }

    .button .text_button {
      position: relative;
      z-index: 10;
      font-size: 0.95rem;
      color: #ffffff;
    }

    .button .platform-icon {
      position: relative;
      z-index: 10;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
    }

    /* ===== FOOTER ===== */
    .footer {
      margin: 40px 0 24px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
